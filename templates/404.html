{% load static %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page non trouvée — Oralise</title>
  <link rel="icon" href="{% static 'assets/img/icons/favicon.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  {% tailwind_css %}
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center font-['Inter']">
  <div class="text-center px-6 max-w-md mx-auto">
    <p class="text-8xl font-bold text-[#26b2bd] mb-4">404</p>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Page non trouvée</h1>
    <p class="text-gray-500 mb-8">La page que vous recherchez n'existe pas ou a été déplacée.</p>
    {% if error %}
    <p class="text-sm text-red-600 mb-6 bg-red-50 border border-red-200 rounded-md px-4 py-2">{{ error }}</p>
    {% endif %}
    <div class="flex items-center justify-center gap-3">
      <a href="/" class="px-5 py-2.5 bg-[#26b2bd] text-white text-sm font-semibold rounded-md hover:opacity-90 transition">Retour à l'accueil</a>
      <a href="javascript:history.back()" class="px-5 py-2.5 border border-gray-200 text-gray-700 text-sm font-semibold rounded-md hover:bg-gray-50 transition">Page précédente</a>
    </div>
  </div>
</body>
</html>
