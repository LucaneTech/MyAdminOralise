<!-- Modal d'édition pour {{ resource.title }} -->
<div class="modal fade" id="editResourceModal{{ resource.id }}" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header bg-warning text-white">
                <h5 class="modal-title">
                    <i class="fas fa-edit mr-2"></i>Modifier la ressource
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            
            <form method="post" action="{% url 'resource_edit' resource.id %}" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="modal-body">
                    <!-- Titre -->
                    <div class="form-group">
                        <label>Titre *</label>
                        <input type="text" name="title" class="form-control" value="{{ resource.title }}" required>
                    </div>
                    
                    <!-- Description -->
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" class="form-control" rows="3">{{ resource.description }}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-12">
                            <div class="form-group">
                                <label>Type *</label>
                                <select name="resource_type" class="form-control" required>
                                    <option value="document" {% if resource.resource_type == 'document' %}selected{% endif %}>Document</option>
                                    <option value="video" {% if resource.resource_type == 'video' %}selected{% endif %}>Vidéo</option>
                                    <option value="link" {% if resource.resource_type == 'link' %}selected{% endif %}>Lien</option>
                                    <option value="other" {% if resource.resource_type == 'other' %}selected{% endif %}>Autre</option>
                                </select>
                            </div>
                        </div>
                        
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Fichier</label>
                                <div class="custom-file">
                                    <input type="file" name="file" class="custom-file-input" id="file{{ resource.id }}">
                                    <label class="custom-file-label" for="file{{ resource.id }}">
                                        {% if resource.file %}{{ resource.file.name }}{% else %}Choisir un fichier...{% endif %}
                                    </label>
                                </div>
                                {% if resource.file %}
                                <small class="form-text text-muted">
                                    <a href="{{ resource.file.url }}" target="_blank">Voir le fichier actuel</a>
                                </small>
                                {% endif %}
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>URL</label>
                                <input type="url" name="url" class="form-control" value="{{ resource.url }}" placeholder="https://...">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Étudiants</label>
                            

                                <select name="students" class="form-control" required>
                                     {% for student in teacher.current_students.all %}
                                    <option value="{{ student.id }}" {% if student in resource.students.all %}selected{% endif %}>
                                        {{ student.user.get_full_name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Langues</label>
                               
                                  <select name="languages" class="form-control" required>
                                     {% for language in teacher.languages.all %}
                                    <option value="{{ language.id }}" {% if language in resource.languages.all %}selected{% endif %}>
                                        {{ language.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-check">
                        <input type="checkbox" name="is_visible" class="form-check-input" id="is_visible{{ resource.id }}" 
                               {% if resource.is_visible %}checked{% endif %}>
                        <label class="form-check-label" for="is_visible{{ resource.id }}">
                            Rendre visible aux étudiants
                        </label>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Annuler</button>
                    <button type="submit" class="btn btn-warning">Enregistrer les modifications</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal de suppression pour {{ resource.title }} -->
<div class="modal fade" id="deleteResourceModal{{ resource.id }}" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">
                    <i class="fas fa-trash mr-2"></i>Confirmer la suppression
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            
            <div class="modal-body text-center py-4">
                <i class="fas fa-exclamation-triangle fa-3x text-warning mb-3"></i>
                <p>Êtes-vous sûr de vouloir supprimer la ressource <strong>"{{ resource.title }}"</strong> ?</p>
                <p class="text-danger mb-0"><small>Cette action est irréversible.</small></p>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Annuler</button>
                <form method="post" action="{% url 'resource_delete' resource.id %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-trash mr-1"></i>Supprimer
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
