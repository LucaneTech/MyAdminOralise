{% load lucide %}
<div class="p-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-base font-bold text-gray-900">Modifier la ressource</h2>
    <button type="button" onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition">
      {% lucide "x" class="w-5 h-5" %}
    </button>
  </div>
  <form method="post" action="{% url 'resource_edit' resource.id %}" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}

    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Titre <span class="text-red-500">*</span></label>
      <input type="text" name="title" value="{{ resource.title }}" required class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition">
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Description</label>
      <textarea name="description" rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition resize-y">{{ resource.description }}</textarea>
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Type <span class="text-red-500">*</span></label>
      <select name="resource_type" required class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition bg-white">
        <option value="document" {% if resource.resource_type == 'document' %}selected{% endif %}>Document</option>
        <option value="video" {% if resource.resource_type == 'video' %}selected{% endif %}>Vidéo</option>
        <option value="link" {% if resource.resource_type == 'link' %}selected{% endif %}>Lien</option>
        <option value="other" {% if resource.resource_type == 'other' %}selected{% endif %}>Autre</option>
      </select>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Fichier</label>
        <input type="file" name="file" class="block w-full text-sm text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-[#033050]/10 file:text-[#033050] hover:file:opacity-80">
        {% if resource.file %}
        <a href="{{ resource.file.url }}" target="_blank" class="text-xs text-[#033050] hover:underline mt-1 block">Voir le fichier actuel</a>
        {% endif %}
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">URL</label>
        <input type="url" name="url" value="{{ resource.url }}" placeholder="https://..." class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Étudiant</label>
        <select name="students" required class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition bg-white">
          {% for student in teacher.current_students.all %}
          <option value="{{ student.id }}" {% if student in resource.students.all %}selected{% endif %}>{{ student.user.get_full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Langue</label>
        <select name="languages" required class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition bg-white">
          {% for language in teacher.languages.all %}
          <option value="{{ language.id }}" {% if language in resource.languages.all %}selected{% endif %}>{{ language.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_visible" id="is_visible{{ resource.id }}" {% if resource.is_visible %}checked{% endif %} class="rounded border-gray-300 text-[#033050] focus:ring-[#033050]">
      <label for="is_visible{{ resource.id }}" class="text-xs text-gray-600">Rendre visible aux étudiants</label>
    </div>

    <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
      <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-200 text-gray-700 text-sm font-semibold rounded-md hover:bg-gray-50 transition">Annuler</button>
      <button type="submit" class="px-4 py-2 bg-yellow-500 text-white text-sm font-semibold rounded-md hover:bg-yellow-600 transition">Enregistrer</button>
    </div>
  </form>
</div>
