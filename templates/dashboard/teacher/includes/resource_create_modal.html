{% load lucide %}
<div class="p-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-base font-bold text-gray-900">Nouvelle ressource</h2>
    <button type="button" onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition">
      {% lucide "x" class="w-5 h-5" %}
    </button>
  </div>
  <form method="post" action="{% url 'resource_create' %}" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    <input type="hidden" name="teachers" value="{{ teacher.id }}">

    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Titre <span class="text-red-500">*</span></label>
      <input type="text" name="title" required class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition">
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Description</label>
      <textarea name="description" rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition resize-y"></textarea>
    </div>

    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Type <span class="text-red-500">*</span></label>
      <select name="resource_type" required class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition bg-white">
        <option value="document">Document</option>
        <option value="video">Vidéo</option>
        <option value="link">Lien</option>
        <option value="other">Autre</option>
      </select>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Fichier</label>
        <input type="file" name="file" class="block w-full text-sm text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-[#033050]/10 file:text-[#033050] hover:file:opacity-80">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">URL</label>
        <input type="url" name="url" placeholder="https://..." class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Étudiant <span class="text-red-500">*</span></label>
        <select name="students" required class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition bg-white">
          {% for student in teacher.current_students.all %}
          <option value="{{ student.id }}">{{ student.user.get_full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Langue <span class="text-red-500">*</span></label>
        <select name="languages" required class="w-full px-3 py-2 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[#033050]/30 focus:border-[#033050] transition bg-white">
          {% for language in teacher.languages.all %}
          <option value="{{ language.id }}">{{ language.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_visible" id="createIsVisible" checked class="rounded border-gray-300 text-[#033050] focus:ring-[#033050]">
      <label for="createIsVisible" class="text-xs text-gray-600">Rendre visible aux étudiants</label>
    </div>

    <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
      <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-200 text-gray-700 text-sm font-semibold rounded-md hover:bg-gray-50 transition">Annuler</button>
      <button type="submit" class="px-4 py-2 bg-[#033050] text-white text-sm font-semibold rounded-md hover:opacity-90 transition">Créer la ressource</button>
    </div>
  </form>
</div>
