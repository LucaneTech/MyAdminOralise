{% extends "dashboard/teacher/layouts/base.html" %}
{% load static %}
{% block title %}Page non trouvée{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-6">
  <p class="text-8xl font-bold text-[#033050] mb-4">404</p>
  <h1 class="text-2xl font-bold text-gray-900 mb-2">Page non trouvée</h1>
  <p class="text-gray-500 mb-8">La page que vous recherchez n'existe pas ou a été déplacée.</p>
  <div class="flex items-center gap-3">
    <a href="/" class="px-5 py-2.5 bg-[#033050] text-white text-sm font-semibold rounded-md hover:opacity-90 transition">Retour à l'accueil</a>
    <a href="javascript:history.back()" class="px-5 py-2.5 border border-gray-200 text-gray-700 text-sm font-semibold rounded-md hover:bg-gray-50 transition">Page précédente</a>
  </div>
</div>
{% endblock %}
