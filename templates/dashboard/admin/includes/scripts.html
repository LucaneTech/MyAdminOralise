<script>
// ── Notifications polling ────────────────────────────────────
function toggleNotifPanel() {
  const panel = document.getElementById('notif-panel');
  if (panel.classList.contains('hidden')) {
    panel.classList.remove('hidden');
  } else {
    panel.classList.add('hidden');
  }
}

function pollNotifications() {
  fetch('/api/notifications/unread/', { credentials: 'same-origin' })
    .then(r => r.json())
    .then(data => {
      const badge = document.getElementById('notif-badge');
      if (badge) {
        badge.textContent = data.count;
        badge.classList.toggle('hidden', data.count === 0);
      }
    })
    .catch(() => {});
}

pollNotifications();
setInterval(pollNotifications, 30000);

// Fermer le panneau notif au clic extérieur
document.addEventListener('click', e => {
  const panel = document.getElementById('notif-panel');
  const btn = document.getElementById('notif-btn');
  if (panel && btn && !panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.add('hidden');
  }
});



//////////////////////////////////////////////////////////////// ── stat and graphes js ───────────────────────────────
(function() {
  // ── Graphe séances (line chart) ───────────────────────────────
  const sessionsCtx = document.getElementById('sessionsChart');
  if (sessionsCtx) {
    new Chart(sessionsCtx, {
      type: 'line',
      data: {
        labels: {{ sessions_labels|safe }},
        datasets: [
          {
            label: 'Complétées',
            data: {{ sessions_completed_data|safe }},
            borderColor: '#10b981',
            backgroundColor: 'rgba(16,185,129,0.08)',
            tension: 0.4,
            fill: true,
            pointBackgroundColor: '#10b981',
            pointRadius: 4,
          },
          {
            label: 'Planifiées',
            data: {{ sessions_scheduled_data|safe }},
            borderColor: '#38bdf8',
            backgroundColor: 'rgba(56,189,248,0.08)',
            tension: 0.4,
            fill: true,
            pointBackgroundColor: '#38bdf8',
            pointRadius: 4,
          }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } } },
        scales: {
          y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 11 } } },
          x: { grid: { display: false }, ticks: { font: { size: 11 } } }
        }
      }
    });
  }

  // ── Graphe financier (doughnut) ───────────────────────────────
  const finCtx = document.getElementById('financeChart');
  if (finCtx) {
    const ca = {{ revenue_total|default:0 }};
    const form = {{ total_paiements_formateurs|default:0 }};
    const marge = Math.max(0, ca - form);
    new Chart(finCtx, {
      type: 'doughnut',
      data: {
        labels: ['Formateurs', 'Marge nette'],
        datasets: [{
          data: [form, marge],
          backgroundColor: ['#2dd4bf', '#10b981'],
          borderWidth: 2,
          borderColor: '#fff',
        }]
      },
      options: {
        responsive: true,
        cutout: '70%',
        plugins: { legend: { display: false } }
      }
    });
  }
  // ── Graphe revenus mensuels (bar chart) ──────────────────────
  const revCtx = document.getElementById('revenueChart');
  if (revCtx) {
    new Chart(revCtx, {
      type: 'bar',
      data: {
        labels: {{ revenue_labels|safe }},
        datasets: [{
          label: 'Revenus (MAD)',
          data: {{ revenue_data|safe }},
          backgroundColor: 'rgba(16,185,129,0.15)',
          borderColor: '#10b981',
          borderWidth: 2,
          borderRadius: 3,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 11 } } },
          x: { grid: { display: false }, ticks: { font: { size: 11 } } }
        }
      }
    });
  }
})();
</script>
