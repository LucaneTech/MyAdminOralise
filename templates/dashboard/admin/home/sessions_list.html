{% extends "dashboard/admin/layouts/base.html" %}
{% load static %}
{% load lucide %}

{% block title %}Séances{% endblock %}

{% block content %}
<div class="bg-white rounded-sm shadow-xl p-4">
  <div id="calendar"></div>
</div>

{% endblock %}

{% block extra_js %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script>
function getCookie(name) {
  const v = `; ${document.cookie}`.split(`; ${name}=`);
  if (v.length===2) return v.pop().split(';').shift();
}

let calendar;
document.addEventListener('DOMContentLoaded', function() {
  calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView: 'timeGridWeek',
    locale: 'fr',
    height: 'auto',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
    },
    slotMinTime: '07:00:00',
    slotMaxTime: '21:00:00',
    events: '/api/sessions/',
    editable: true,
    selectable: true,
    select: function(info) {
      window.location.href = `/administrateur/seances/creer/?start=${info.startStr}&end=${info.endStr}`;
    },
    eventClick: function(info) {
      window.location.href = `/administrateur/seances/${info.event.extendedProps.session_id}/modifier/`;
    },
    eventDrop: function(info) {
      const s = info.event.startStr;
      const e = info.event.endStr;
      fetch(`/api/sessions/${info.event.id}/update/`, {
        method: 'POST',
        headers: {'X-CSRFToken': getCookie('csrftoken'), 'Content-Type': 'application/json'},
        body: JSON.stringify({
          date: s.substring(0,10),
          start_time: s.substring(11,16),
          end_time: e.substring(11,16)
        })
      }).then(r => r.json()).then(d => { if(!d.success) info.revert(); });
    },
    eventResize: function(info) {
      const s = info.event.startStr;
      const e = info.event.endStr;
      fetch(`/api/sessions/${info.event.id}/update/`, {
        method: 'POST',
        headers: {'X-CSRFToken': getCookie('csrftoken'), 'Content-Type': 'application/json'},
        body: JSON.stringify({
          date: s.substring(0,10),
          start_time: s.substring(11,16),
          end_time: e.substring(11,16)
        })
      }).then(r => r.json()).then(d => { if(!d.success) info.revert(); });
    }
  });
  calendar.render();
});
</script>
{% endblock %}
