{% extends 'dashboard/admin/layouts/base.html' %}
{% block title %}{{ titre }}{% endblock %}

{% block content %}
<div class="header pb-6" style="background-color:#c0392b;">
  <div class="container-fluid">
    <div class="header-body">
      <div class="row align-items-center py-4">
        <div class="col">
          <h6 class="h2 text-white d-inline-block mb-0">{{ titre }}</h6>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container-fluid mt--6">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow border-danger">
        <div class="card-body text-center py-5">
          <div class="mb-4">
            <i class="fas fa-exclamation-triangle fa-3x text-danger"></i>
          </div>
          <h4 class="text-danger">Confirmer la suppression</h4>
          <p class="text-muted mb-4">
            Voulez-vous vraiment supprimer <strong>{{ objet }}</strong> ?<br>
            <small>Cette action est irréversible.</small>
          </p>
          <form method="post">
            {% csrf_token %}
            <a href="{% url back_url %}" class="btn btn-secondary mr-3">
              <i class="fas fa-times mr-1"></i>Annuler
            </a>
            <button type="submit" class="btn btn-danger">
              <i class="fas fa-trash mr-1"></i>Supprimer définitivement
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
